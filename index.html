<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>

<body>
  <section class="matrix-eisenhower">
    <img src="./eisenhower-matrix.jpg" alt="Eisenhower matrix">
    <a class="more-inf" href="https://goal-life.com/page/method/matrix-eisenhower">
      Want more details?
    </a>
  </section>
  <section class="action-list">
    <p id="add-item">
      <label for="new-task">
        Add Item
      </label>
    <div class="add-item__wrapper">
        <input id="new-task" class="task" type="text">
        <button>
            Add
        </button>
    </div>
    </p>
    <h3 class = "title">Todo</h3>
    <ul id="incomplete-tasks">
      <li class = "task-list">
        <input type="checkbox">
        <label class="task">
          Pay Bills
        </label>
        <input type="text" class="task">
        <button class="edit">Edit</button>
        <button class="delete">
        <img src="./remove.svg" alt="Cross to delete">
        </button>
      </li>
      <li class="edit-mode">
        <input type="checkbox">
        <label class="task">
          Go Shopping
        </label>
        <input type="text" value="Go Shopping" class="task">
        <button class="edit">
          Save
        </button>
        <button class="delete">
          <img src="./remove.svg" alt="Cross to delete">
        </button>
      </li>
    </ul>
    <h3 class="title">Completed</h3>
    <ul id="completed-tasks">
      <li class = "task-list">
        <input type="checkbox" checked>
        <label class="task">
          See the Doctor
        </label>
        <input type="text" class="task">
        <button class="edit">
          Edit
        </button>
        <button class="delete">
          <img src="./remove.svg" alt="Cross to delete">
        </button>
      </li>
    </ul>
  </section>
  <script src="app.js"></script>
</body>

</html>
